name: Auto Release on Main

on:
  pull_request:
    branches:
      - main
    types: [closed] 

jobs:
  auto-release:
    
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      
      - name: Get latest tag and bump version
        id: get_tag
        run: |
          # Récupère le dernier tag ou V.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "V.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Extraction robuste : supprime tous les caractères non-numériques en tête
          # Gère tous les formats : v0.0.2 / V.0.2 / V.v0.0.2 / etc.
          VERSION=$(echo "$LATEST_TAG" | sed 's/^[^0-9]*//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}

          # Incrémentation du MINOR
          MINOR=$((MINOR + 1))

          # Si MINOR dépasse 5 → on incrémente MAJOR et on remet MINOR à 0
          if [ $MINOR -gt 5 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi

          NEW_VERSION="V.$MAJOR.$MINOR"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Nouvelle version calculée: $NEW_VERSION"
      
      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.get_tag.outputs.new_version }} -m "Auto-release ${{ steps.get_tag.outputs.new_version }}"
          git push origin ${{ steps.get_tag.outputs.new_version }}
      
      - name: Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          echo "##  Changements dans cette Release" > release_notes.md
          echo "" >> release_notes.md

          # Si c'est le tout premier tag, on prend tous les commits
          if [ "$PREVIOUS_TAG" = "V.0.0" ]; then
            git log --pretty=format:"- %s (%h)" >> release_notes.md
          else
            git log "$PREVIOUS_TAG"..HEAD --pretty=format:"- %s (%h)" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo -e "\n**Date de release:** $(date +'%Y-%m-%d %H:%M:%S')" >> release_notes.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2 
        with:
          tag_name: ${{ steps.get_tag.outputs.new_version }}
          name: Release ${{ steps.get_tag.outputs.new_version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}