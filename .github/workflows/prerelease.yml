name: Prerelease on Release Branch

on:
  pull_request:
    branches:
      - release
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prerelease:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────────────────
      # Calcule la prochaine version RC (vX.Y.Z-rc.N)
      # en analysant les conventional commits depuis le dernier
      # tag de release stable (vX.Y.Z).
      # ─────────────────────────────────────────────────────────
      - name: Compute RC version
        id: rc_version
        run: |
          # Dernier tag de release stable
          LATEST_RELEASE=$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")

          VERSION=${LATEST_RELEASE#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Analyse des commits pour estimer le prochain bump
          if [ "$LATEST_RELEASE" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s%n%b" --)
          else
            COMMITS=$(git log "$LATEST_RELEASE"..HEAD --pretty=format:"%s%n%b" --)
          fi

          BREAKING=$(echo "$COMMITS" | grep -cE "BREAKING CHANGE|^[a-z]+(\(.+\))?!:" || true)
          FEAT=$(echo "$COMMITS"     | grep -cE "^feat(\(.+\))?:" || true)

          if [ "$BREAKING" -gt 0 ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$FEAT" -gt 0 ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          BASE_VERSION="v$MAJOR.$MINOR.$PATCH"

          # Incrémente le numéro RC si un tag RC existe déjà pour cette version
          LAST_RC=$(git tag --sort=-creatordate | grep -E "^${BASE_VERSION}-rc\.[0-9]+$" | head -1 || echo "")
          if [ -z "$LAST_RC" ]; then
            RC_NUM=1
          else
            RC_NUM=$(echo "$LAST_RC" | grep -oE '[0-9]+$')
            RC_NUM=$((RC_NUM + 1))
          fi

          NEW_TAG="${BASE_VERSION}-rc.${RC_NUM}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "latest_release=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          echo "RC tag calculé : $NEW_TAG"

      - name: Create RC Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.rc_version.outputs.new_tag }} -m "Prerelease ${{ steps.rc_version.outputs.new_tag }}"
          git push origin ${{ steps.rc_version.outputs.new_tag }}

      - name: Generate RC release notes
        run: |
          LATEST_RELEASE="${{ steps.rc_version.outputs.latest_release }}"
          NEW_TAG="${{ steps.rc_version.outputs.new_tag }}"
          BASE_VERSION="${{ steps.rc_version.outputs.base_version }}"

          {
            echo "## 🚀 Release Candidate — $NEW_TAG"
            echo ""
            echo "> ⚠️ **Préversion** — ne pas utiliser en production."
            echo "> Candidate pour la release **$BASE_VERSION**"
            echo ""
            echo "### Changements inclus"
            echo ""

            if [ "$LATEST_RELEASE" = "v0.0.0" ]; then
              git log --pretty=format:"- %s (\`%h\`)"
            else
              git log "$LATEST_RELEASE"..HEAD --pretty=format:"- %s (\`%h\`)"
            fi

            echo ""
            echo ""
            echo "---"
            echo "**Date :** $(date +'%Y-%m-%d %H:%M:%S UTC')"
          } > rc_notes.md

      - name: Create Prerelease GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rc_version.outputs.new_tag }}
          name: ${{ steps.rc_version.outputs.new_tag }}
          body_path: rc_notes.md
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
