# This GitHub Actions workflow was generated by Gemini
#
# It performs the following actions for the Cesizen project:
# 1. On every push to any branch:
#    - Runs Laravel (PHPUnit) tests.
#    - Runs React (Vitest) tests.
# 2. On every Pull Request to the 'main' branch:
#    - Runs all the tests mentioned above.
#    - Runs SonarQube scan on the backend code.
# 3. On every push to the 'main' branch (e.g., after a PR is merged):
#    - Runs a production build for the frontend application.

name: Laravel & React CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  laravel-tests:
    name: Laravel (PHPUnit) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarQube analysis

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # Assuming PHP 8.3, adjust if needed
          extensions: dom, curl, libxml, mbstring, zip, pcov # PCOV for code coverage
          tools: composer
          coverage: pcov

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit tests with coverage
        run: php artisan test --coverage-clover=coverage/clover.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage-report
          path: backend/coverage/clover.xml

  react-tests:
    name: React (Vitest) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using a recent LTS version

      - name: Install NPM Dependencies
        run: npm install

      - name: Run Vitest tests
        run: npm run test -- --run # Use --run to prevent watch mode in CI

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: php-coverage-report
          path: backend/coverage

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-production:
    name: Build Frontend for Production
    runs-on: ubuntu-latest
    needs: [laravel-tests, react-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build production assets
        run: npm run build
