name: Laravel & React CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  laravel-tests:
    name: Laravel (PHPUnit) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcov
          tools: composer
          coverage: pcov

      - name: Set Composer platform version
        run: composer config platform.php -- '8.4'
        working-directory: ./backend

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-progress
        working-directory: ./backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Create backend/public directory
        run: mkdir -p backend/public

      - name: Build Frontend Assets
        run: npm run build
        working-directory: ./frontend

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate
        working-directory: ./backend

      - name: Run PHPUnit tests with coverage
        run: php artisan test --coverage-clover=coverage/clover.xml
        working-directory: ./backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage-report
          path: backend/coverage/clover.xml

  react-tests:
    name: React (Vitest) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm install

      - name: Run Vitest tests
        run: npm run test -- --run
        env:
          LARAVEL_BYPASS_ENV_CHECK: 1

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: php-coverage-report
          path: backend/coverage

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-production:
    name: Build Frontend for Production
    runs-on: ubuntu-latest
    needs: [laravel-tests, react-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create backend/public directory
        run: mkdir -p backend/public

      - name: Install NPM Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Build production assets
        run: npm run build
        working-directory: ./frontend
