name: Laravel & React CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop
      - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  laravel-tests:
    name: Laravel (PHPUnit) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcov
          tools: composer
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Set Composer platform version
        run: composer config platform.php -- '8.4'

      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Create backend/public directory
        run: mkdir -p backend/public

      - name: Build Frontend Assets
        run: npm run build
        working-directory: ./frontend

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit tests with coverage
        run: php artisan test --coverage-clover=coverage/clover.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage-report
          path: backend/coverage/clover.xml

  react-tests:
    name: React (Vitest) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install NPM Dependencies
        run: npm install

      - name: Run Vitest tests with coverage
        run: npm run test:ci
        env:
          LARAVEL_BYPASS_ENV_CHECK: 1

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
