name: Laravel & React CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  laravel-tests:
    name: Laravel (PHPUnit) Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcov
          tools: composer
          coverage: pcov
      - name: Set Composer platform version
        run: composer config platform.php -- '8.4'
        working-directory: ./backend
      - name: Install Composer Dependencies
        run: composer install --prefer-dist --no-progress
        working-directory: ./backend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend
      - name: Create backend/public directory
        run: mkdir -p backend/public
      - name: Build Frontend Assets
        run: npm run build
        working-directory: ./frontend
      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate
        working-directory: ./backend
      - name: Run PHPUnit tests with coverage
        run: php artisan test --coverage-clover=coverage/c